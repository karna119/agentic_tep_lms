services:
  - type: web
    name: agentic-lms-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agentic-lms-db
          property: connectionString
      - key: FRONTEND_URL
        value: "*" # Update this once Vercel gives you a URL

databases:
  - name: agentic-lms-db
    databaseName: lms_db
    user: lms_user
